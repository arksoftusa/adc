version: '3.8'

services:
  appsmith:
    image: appsmith/appsmith-ce:v1.58
    container_name: appsmith-admin-pgvector
    restart: unless-stopped
    ports:
      - '8085:80'
    environment:
      - APPSMITH_DISABLE_TELEMETRY=true
      - APPSMITH_ENCRYPTION_PASSWORD=change-me-appsmith-password
      - APPSMITH_ENCRYPTION_SALT=change-me-appsmith-salt
      - APPSMITH_REDIS_URL=redis://redis:6379
      - APPSMITH_PGVECTOR_HOST=postgres
      - APPSMITH_PGVECTOR_PORT=5432
      - APPSMITH_PGVECTOR_DATABASE=appsmith_ai
      - APPSMITH_PGVECTOR_USERNAME=appsmith
      - APPSMITH_PGVECTOR_PASSWORD=change-me-appsmith-pg
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgvector-init:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/api/v1/health | grep -qi "ok"']
      interval: 20s
      timeout: 5s
      retries: 6
    volumes:
      - appsmith_pgvector_stacks:/appsmith-stacks
    networks:
      - appsmith-pgvector-network

  postgres:
    image: pgvector/pgvector:pg16
    container_name: appsmith-pgvector
    restart: unless-stopped
    environment:
      - POSTGRES_DB=appsmith_ai
      - POSTGRES_USER=appsmith
      - POSTGRES_PASSWORD=change-me-appsmith-pg
    volumes:
      - appsmith_pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U appsmith -d appsmith_ai']
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - appsmith-pgvector-network

  pgvector-init:
    image: pgvector/pgvector:pg16
    container_name: appsmith-pgvector-init
    restart: 'no'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PGPASSWORD=change-me-appsmith-pg
    entrypoint:
      - /bin/sh
      - -c
      - |
        psql -h postgres -U appsmith -d appsmith_ai -c "CREATE EXTENSION IF NOT EXISTS vector;"
    networks:
      - appsmith-pgvector-network

  redis:
    image: redis:7-alpine
    container_name: appsmith-pgvector-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - appsmith_pgvector_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - appsmith-pgvector-network

volumes:
  appsmith_pgvector_stacks:
    driver: local
  appsmith_pgvector_data:
    driver: local
  appsmith_pgvector_redis_data:
    driver: local

networks:
  appsmith-pgvector-network:
    driver: bridge
