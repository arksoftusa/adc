services:
  gateway:
    build:
      context: .
      dockerfile: src/Dockerfile.gateway.prod
    container_name: app-gateway
    restart: unless-stopped
    expose:
      - '8080'
    labels:
      - coolify.managed=true
      - traefik.enable=true
      - traefik.docker.network=z00ws84oc40g48wo0kk844ws
      - traefik.http.routers.app-gateway-https.entryPoints=https
      - traefik.http.routers.app-gateway-https.rule=Host(`example.com`)
      - traefik.http.routers.app-gateway-https.tls=true
      - traefik.http.services.app-gateway.loadbalancer.server.port=8080
      - traefik.http.routers.app-gateway-http.entryPoints=http
      - traefik.http.routers.app-gateway-http.rule=Host(`example.com`)
      - traefik.http.routers.app-gateway-http.middlewares=redirect-to-https
    depends_on:
      - api
      - frontend
    networks:
      - app-network
    healthcheck:
      test:
        - CMD
        - wget
        - '--no-verbose'
        - '--tries=1'
        - '--spider'
        - 'http://127.0.0.1:8080/_gateway_health'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  api:
    build:
      context: .
      dockerfile: src/Dockerfile.prod
    container_name: app-api
    restart: unless-stopped
    expose:
      - '8000'
    labels:
      - coolify.managed=true
      - traefik.enable=false
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - 'REDIS_URL=redis://redis:6379/0'
      - POSTGRES_SERVER=postgres
      - POSTGRES_PORT=5432
      - 'POSTGRES_DB=${POSTGRES_DB:-appdb}'
      - 'POSTGRES_USER=${POSTGRES_USER:-app}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-app}'
      - 'SECRET_KEY=${SECRET_KEY:-change-me-secret-key}'
      - 'JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-jwt-secret-key}'
      - 'AD_BASE_URL=${AD_BASE_URL:-http://localhost:8002}'
      - 'AD_OPERATOR_TOKEN=${AD_OPERATOR_TOKEN:-}'
      - 'AD_AGENCY_ROUTES=${AD_AGENCY_ROUTES:-}'
      - 'OPENAI_API_KEY=${OPENAI_API_KEY:-dummy-openai-key}'
      - 'OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}'
      - 'CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}'
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - app-network
    command: 'uvicorn src.backend.main:app --host 0.0.0.0 --port 8000 --workers 4'
    healthcheck:
      test:
        - CMD
        - curl
        - '-f'
        - 'http://localhost:8000/health'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  frontend:
    build:
      context: .
      dockerfile: src/Dockerfile.frontend.prod
      args:
        - 'VUESTIC_ADMIN_REPO=https://github.com/epicmaxco/vuestic-admin'
        - 'VUESTIC_ADMIN_REF=master'
        - 'NEXT_PUBLIC_API_URL=https://example.com'
        - 'API_URL=https://example.com'
    container_name: app-frontend
    restart: unless-stopped
    expose:
      - '3000'
    environment:
      - 'NEXT_PUBLIC_API_URL=https://example.com'
      - NODE_ENV=production
      - 'API_URL=https://example.com'
    labels:
      - coolify.managed=true
      - traefik.enable=false
    depends_on:
      - api
    networks:
      - app-network
    healthcheck:
      test:
        - CMD
        - wget
        - '--no-verbose'
        - '--tries=1'
        - '--spider'
        - 'http://127.0.0.1:3000'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  redis:
    image: 'redis:7-alpine'
    container_name: app-redis
    restart: unless-stopped
    volumes:
      - 'redis_data:/data'
    networks:
      - app-network
    command: 'redis-server --appendonly yes'
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 3s
      retries: 3
  postgres:
    image: 'pgvector/pgvector:pg16'
    container_name: app-postgres
    restart: unless-stopped
    environment:
      - 'POSTGRES_DB=${POSTGRES_DB:-appdb}'
      - 'POSTGRES_USER=${POSTGRES_USER:-app}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-app}'
    volumes:
      - 'postgres_data:/var/lib/postgresql/data'
    networks:
      - app-network
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-appdb}'
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
networks:
  app-network:
    driver: bridge