services:
  gateway:
    image: your-gateway-image:tag
    ports:
      - "8080:8080"
    healthcheck:
      test:
        - CMD
        - wget
        - '--no-verbose'
        - '--tries=1'
        - '--spider'
        - 'http://127.0.0.1:8080/_gateway_health'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s